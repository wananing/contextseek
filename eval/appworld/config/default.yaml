# Default AppWorld evaluation config for ContextSeek.

experiment_name: contextseek_appworld_dev
dataset: test_normal
max_tasks: 20
resume: true
output_dir: ./output/appworld

appworld:
  # Python executable of the isolated AppWorld virtualenv.
  # Example: /path/to/appworld/.venv/bin/python
  python: ${APPWORLD_PYTHON}

agent:
  type: contextseek_react
  model: gpt-4o
  max_steps: 25
  temperature: 0.0
  llm_api_key: ${OPENAI_API_KEY}
  # OpenAI-compatible API base URL (optional):
  llm_base_url: ${LLM_BASE_URL}
  llm_provider: openai        # openai | azure | anthropic
  # azure_endpoint: ${AZURE_OPENAI_ENDPOINT}
  # azure_deployment: gpt-4o
  store_only: false
  auto_compact: false
  initial_context_tokens: 1200
  error_context_limit: 3

contextseek:
  enabled: true
  scope: appworld/{experiment_name}/{dataset}/global
  storage:
    backend: file
    path: .contextseek/appworld
  retrieval:
    default_k: 20
    default_budget: 20
  evolution:
    enabled: false
    extract_min_age_seconds: 0
  observability:
    audit_enabled: true
    audit_path: .contextseek/appworld_audit.jsonl

distill:
  compact_after: true
  max_records: null

evaluate:
  adapter_names: null
