experiment_name: appworld_contextseek_store_only_ob
dataset: test_normal
max_tasks: 0
resume: true
output_dir: ./output/appworld

appworld:
  python: ${APPWORLD_PYTHON}

agent:
  type: contextseek_react
  model: gpt-4o
  max_steps: 25
  temperature: 0.0
  llm_api_key: ${OPENAI_API_KEY}
  # OpenAI-compatible API base URL (optional):
  llm_base_url: ${LLM_BASE_URL}
  llm_provider: openai
  store_only: true
  auto_compact: false

contextseek:
  enabled: true
  scope: appworld/shared/test_normal/oceanbase
  storage:
    backend: oceanbase
    oceanbase:
      host: ${OB_HOST}
      port: ${OB_PORT}
      user: ${OB_USER}
      password: ${OB_PASSWORD}
      db_name: ${OB_DB_NAME}
      table_name: contextseek_appworld_store_only_v4_1024
      vector_dims: 1024
      fulltext_parser: ngram
      metric: cosine
      vector_weight: 0.7
      fts_weight: 0.3
      rrf_k: 60
  embedding:
    provider: langchain
    class_path: langchain_openai.OpenAIEmbeddings
    model: text-embedding-v4
    dims: 1024
    kwargs:
      api_key: ${OPENAI_API_KEY}
      # If embeddings also go through an OpenAI-compatible gateway:
      base_url: ${EMBEDDING_BASE_URL}
      check_embedding_ctx_length: false
  llm:
    provider: langchain
    class_path: langchain_openai.ChatOpenAI
    model: gpt-4o
    kwargs:
      api_key: ${OPENAI_API_KEY}
      base_url: ${LLM_BASE_URL}
      temperature: 0.0
  summarizer:
    # LLM 生成 L0 abstract / L1 summary，embedding 打在 abstract 上，避免超长全文直送 embedding。
    # 若不想多一次 LLM：provider: none
    provider: llm
    l0_max_chars: 800
    l1_max_chars: 2000
  retrieval:
    default_k: 20
    default_budget: 20
  evolution:
    enabled: false
    extract_min_age_seconds: 0
  observability:
    audit_enabled: true
    audit_path: .contextseek/appworld_ob_audit.jsonl

distill:
  compact_after: true
  max_records: null
