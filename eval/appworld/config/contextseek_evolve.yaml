experiment_name: appworld_contextseek_evolve
dataset: test_normal
max_tasks: 0
resume: true
output_dir: ./output/appworld

appworld:
  python: ${APPWORLD_PYTHON}

agent:
  type: contextseek_react
  model: gpt-4o
  max_steps: 25
  temperature: 0.0
  llm_api_key: ${OPENAI_API_KEY}
  # OpenAI-compatible API base URL (optional):
  llm_base_url: ${LLM_BASE_URL}
  llm_provider: openai
  store_only: false
  auto_compact: true
  initial_context_tokens: 1200
  error_context_limit: 3

contextseek:
  enabled: true
  scope: appworld/shared/test_normal/global
  storage:
    backend: file
    path: .contextseek/appworld
  retrieval:
    default_k: 20
    default_budget: 20
  evolution:
    enabled: true
    extract_min_age_seconds: 0
    distill_min_use_count: 2
    distill_min_relevance_boost: 1.2
  observability:
    audit_enabled: true
    audit_path: .contextseek/appworld_audit.jsonl

distill:
  compact_after: true
  max_records: null
